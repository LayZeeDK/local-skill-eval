name: 'Setup Ollama'
description: 'Install Ollama, cache models, start server with optimized config, pull and create models'
inputs:
  models:
    description: 'YAML list of model entries. Each entry: name (required), modelfile (optional), as (optional)'
    required: true
  ollama-version:
    description: 'Ollama CLI version'
    required: false
    default: '0.17.7'
runs:
  using: 'composite'
  steps:
    - name: Install Ollama
      uses: ai-action/setup-ollama@v2
      with:
        version: ${{ inputs.ollama-version }}

    - name: Compute models hash
      id: models-hash
      shell: bash
      run: |
        HASH=$(echo '${{ inputs.models }}' | sha256sum | cut -c1-16)
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"

    - name: Cache Ollama models
      uses: actions/cache@v5
      with:
        path: ~/.ollama
        key: ollama-models-${{ steps.models-hash.outputs.hash }}
        restore-keys: |
          ollama-models-

    - name: Start Ollama with optimized config
      shell: bash
      run: |
        # Stop server auto-started by setup-ollama, restart with optimized env
        pkill ollama 2>/dev/null || true
        sleep 1

        # Export to GITHUB_ENV so subsequent steps (npm run validate) see them
        echo "OLLAMA_FLASH_ATTENTION=1" >> "$GITHUB_ENV"
        echo "OLLAMA_KV_CACHE_TYPE=q8_0" >> "$GITHUB_ENV"
        echo "OLLAMA_NUM_PARALLEL=1" >> "$GITHUB_ENV"
        echo "OLLAMA_NUM_THREAD=4" >> "$GITHUB_ENV"
        echo "OLLAMA_MAX_LOADED_MODELS=1" >> "$GITHUB_ENV"

        OLLAMA_FLASH_ATTENTION=1 \
        OLLAMA_KV_CACHE_TYPE=q8_0 \
        OLLAMA_NUM_PARALLEL=1 \
        OLLAMA_NUM_THREAD=4 \
        OLLAMA_MAX_LOADED_MODELS=1 \
        ollama serve &
        for i in $(seq 1 30); do
          curl -sf http://localhost:11434/ > /dev/null 2>&1 && break
          sleep 1
        done
        echo "[OK] Ollama ready"

    - name: Pull and create models
      shell: bash
      run: |
        current_name=""
        current_modelfile=""
        current_as=""

        process_entry() {
          if [ -n "$current_name" ]; then
            echo "[INFO] Pulling $current_name..."
            ollama pull "$current_name"

            if [ -n "$current_modelfile" ] && [ -n "$current_as" ]; then
              echo "[INFO] Creating $current_as from $current_modelfile..."
              ollama create "$current_as" -f "$current_modelfile"
            fi
          fi
          current_name=""
          current_modelfile=""
          current_as=""
        }

        echo '${{ inputs.models }}' > /tmp/models.yml
        while IFS= read -r line; do
          trimmed=$(echo "$line" | sed 's/^[[:space:]]*//')
          case "$trimmed" in
            "- name:"*)
              process_entry
              current_name="${trimmed#*- name: }"
              ;;
            "name:"*)
              process_entry
              current_name="${trimmed#*name: }"
              ;;
            "modelfile:"*)
              current_modelfile="${trimmed#*modelfile: }"
              ;;
            "as:"*)
              current_as="${trimmed#*as: }"
              ;;
          esac
        done < /tmp/models.yml
        process_entry
