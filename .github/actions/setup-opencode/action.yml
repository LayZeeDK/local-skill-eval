name: 'Setup OpenCode'
description: 'Install opencode CLI, export OPENCODE_BIN_PATH, disable auto-update, verify installation'
inputs:
  version:
    description: 'OpenCode version to install'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install OpenCode
      shell: bash
      run: |
        npm install -g opencode-ai@${{ inputs.version }}
        echo "OPENCODE_BIN_PATH=$(command -v opencode)" >> "$GITHUB_ENV"
        echo "OPENCODE_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"

    - name: Verify installation
      shell: bash
      run: |
        # opencode --version hangs in CI (Bun runtime initialization issue)
        # Verify binary exists and is executable instead
        OPENCODE_PATH=$(command -v opencode)
        test -x "$OPENCODE_PATH" && echo "[OK] opencode installed at $OPENCODE_PATH" || { echo "[ERROR] opencode not found"; exit 1; }
        echo "[INFO] Architecture: $(uname -m)"
