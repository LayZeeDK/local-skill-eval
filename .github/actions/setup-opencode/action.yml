name: 'Setup OpenCode'
description: 'Install opencode CLI, export OPENCODE_BIN_PATH, disable auto-update, verify installation'
inputs:
  version:
    description: 'OpenCode version to install'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install unbuffer (expect)
      shell: bash
      run: |
        # unbuffer forces line-buffered output via PTY — required because
        # Bun (opencode's runtime) uses libc full buffering when stdout is
        # a pipe/file, and timeout kills the process before flushing.
        sudo apt-get install -y -qq expect
    - name: Install and verify OpenCode
      shell: bash
      run: |
        npm install -g opencode-ai@${{ inputs.version }}
        OPENCODE_PATH=$(command -v opencode)
        if [ -x "$OPENCODE_PATH" ]; then
          echo "[OK] opencode installed at $OPENCODE_PATH"
        else
          echo "[FAIL] opencode not found"
          exit 1
        fi
        echo "OPENCODE_BIN_PATH=$OPENCODE_PATH" >> "$GITHUB_ENV"
        echo "OPENCODE_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"
        echo "[INFO] Architecture: $(uname -m)"
        # Try opencode --version with 10s timeout (may hang due to Bun runtime init)
        timeout 10 opencode --version || echo "[WARN] opencode --version timed out or failed (non-blocking)"
