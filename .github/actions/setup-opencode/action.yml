name: 'Setup OpenCode'
description: 'Install opencode CLI, disable auto-update, verify installation'
inputs:
  version:
    description: 'OpenCode version to install'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Install and verify OpenCode
      shell: bash
      run: |
        npm install -g opencode-ai@${{ inputs.version }}
        if ! command -v opencode &>/dev/null; then
          echo "[FAIL] opencode not found on PATH"
          exit 1
        fi
        echo "[OK] opencode installed at $(command -v opencode)"
        echo "[INFO] Architecture: $(uname -m)"
        # Do NOT export OPENCODE_BIN_PATH — opencode's launcher script
        # reads it and spawnSync's the target, causing infinite recursion
        # when it points at the launcher itself.
        echo "OPENCODE_DISABLE_AUTOUPDATE=true" >> "$GITHUB_ENV"
        timeout 10 opencode --version || echo "[WARN] opencode --version timed out or failed (non-blocking)"
