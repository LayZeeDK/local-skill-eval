name: Skill Eval

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-graders:
    name: Validate Graders
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-validate-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-ollama
        with:
          models: |
            - name: qwen2.5:3b
            - name: qwen3:4b
      - name: Compute Docker cache key
        id: docker-cache
        run: |
          HASH=$(find tasks/superlint_demo -type f | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "key=docker-eval-superlint-$HASH" >> "$GITHUB_OUTPUT"
      - name: Restore Docker image cache
        id: docker-restore
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: ${{ steps.docker-cache.outputs.key }}
      - name: Load cached Docker image
        if: steps.docker-restore.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/eval-image.tar
      - name: Validate (local)
        run: npm run validate -- superlint_demo --provider=local
      - name: Validate (docker)
        run: npm run validate -- superlint_demo --provider=docker
      - name: Save Docker image to cache
        if: steps.docker-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep skill-eval-superlint | head -1)
          if [ -n "$IMAGE" ]; then
            docker save -o /tmp/docker-cache/eval-image.tar "$IMAGE"
          fi
      - name: Preview results
        if: always()
        run: npm run preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-validate
          path: results/

  # ---------- opencode / local ----------
  opencode-local:
    name: Agent Eval (opencode/local)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-ollama
        with:
          models: |
            - name: qwen3:4b
              modelfile: modelfiles/qwen3-4b-skill-eval-opencode-agent.ci.Modelfile
              as: qwen3-4b-skill-eval-opencode-agent
      - name: Setup OpenCode
        uses: ./.github/actions/setup-opencode
      - name: PTY smoke test
        run: |
          echo "--- Layer 0: opencode binary layout ---"
          LAUNCHER="$OPENCODE_CLI_PATH"
          LAUNCHER_DIR=$(dirname "$(readlink -f "$LAUNCHER")")
          echo "Launcher: $LAUNCHER ($(file -b "$LAUNCHER" | head -c80))"
          echo "Launcher dir: $LAUNCHER_DIR"
          echo "Platform binaries:"
          find "$LAUNCHER_DIR" -path "*/opencode-linux-*/bin/opencode" -type f 2>/dev/null | while read -r bin; do
            echo "  $bin ($(file -b "$bin" | head -c60))"
          done
          # Also check node_modules siblings
          NPM_GLOBAL=$(npm root -g 2>/dev/null)
          echo "npm global root: $NPM_GLOBAL"
          find "$NPM_GLOBAL/opencode-ai" -name "opencode" -path "*/bin/*" -type f 2>/dev/null | while read -r bin; do
            echo "  $bin ($(file -b "$bin" | head -c60))"
          done

          echo "--- L0: opencode --version (regression check) ---"
          timeout 5 $OPENCODE_CLI_PATH --version || echo "L0 HUNG (OPENCODE_BIN_PATH still leaking?)"

          echo "--- Layer 1: script captures basic echo ---"
          script -q -e --flush -c 'echo hello-from-pty' /tmp/t1.log
          echo "L1 bytes=$(wc -c < /tmp/t1.log)"
          cat /tmp/t1.log

          echo "--- Layer 2: Node.js writes to PTY (baseline) ---"
          script -q -e --flush -c "node -e 'process.stdout.write(\"node-pty-ok\\n\")'" /tmp/t2.log
          echo "L2 bytes=$(wc -c < /tmp/t2.log)"
          cat /tmp/t2.log

          echo "--- Layer 3: opencode --version to PTY ---"
          timeout 15 script -q -e --flush -c "$OPENCODE_CLI_PATH --version" /tmp/t3.log || true
          echo "L3 bytes=$(wc -c < /tmp/t3.log)"
          cat /tmp/t3.log

          echo "--- Layer 3b: opencode --version via script with /dev/null stdin (approach 11) ---"
          timeout 15 script -q -e --flush -c "$OPENCODE_CLI_PATH --version < /dev/null" /tmp/t3b.log || true
          echo "L3b bytes=$(wc -c < /tmp/t3b.log)"
          cat /tmp/t3b.log

          echo "--- Layer 4: opencode --version to pipe (inherited GHA stdin) ---"
          echo "NODE_OPTIONS=${NODE_OPTIONS:-<unset>}"
          timeout 15 $OPENCODE_CLI_PATH --version > /tmp/t4.log 2>&1 || true
          echo "L4 bytes=$(wc -c < /tmp/t4.log)"
          cat /tmp/t4.log

          echo "--- Layer 4b: opencode --version with explicit /dev/null stdin ---"
          timeout 10 $OPENCODE_CLI_PATH --version < /dev/null > /tmp/t4b.log 2>&1 || true
          echo "L4b bytes=$(wc -c < /tmp/t4b.log)"
          cat /tmp/t4b.log

          echo "--- Layer 4c: opencode --version with unset NODE_OPTIONS ---"
          timeout 10 env -u NODE_OPTIONS $OPENCODE_CLI_PATH --version < /dev/null > /tmp/t4c.log 2>&1 || true
          echo "L4c bytes=$(wc -c < /tmp/t4c.log)"
          cat /tmp/t4c.log

          echo "--- Layer 5: opencode run to PTY (15s, expect partial) ---"
          echo "Say hello" > /tmp/smoke-prompt.md
          timeout --kill-after=5 15 script -q -e --flush -c "OPENCODE_DISABLE_CLAUDE_CODE_PROMPT=1 OPENCODE_DISABLE_EXTERNAL_SKILLS=1 $OPENCODE_CLI_PATH run \"\$(cat /tmp/smoke-prompt.md)\"" /tmp/t5.log || true
          echo "L5 bytes=$(wc -c < /tmp/t5.log)"
          cat /tmp/t5.log

          echo "--- Layer 6: opencode run to pipe (for comparison) ---"
          timeout --kill-after=5 15 bash -c "OPENCODE_DISABLE_CLAUDE_CODE_PROMPT=1 OPENCODE_DISABLE_EXTERNAL_SKILLS=1 $OPENCODE_CLI_PATH run \"\$(cat /tmp/smoke-prompt.md)\" < /dev/null" > /tmp/t6.log 2>&1 || true
          echo "L6 bytes=$(wc -c < /tmp/t6.log)"
          cat /tmp/t6.log
      - name: Run agent eval
        timeout-minutes: 15
        run: npx tsx src/cli.ts superlint_demo --agent=opencode --provider=local --trials=1
      - name: Preview results
        if: always()
        run: npm run preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-opencode-local
          path: results/

  # ---------- opencode / docker ----------
  opencode-docker:
    name: Agent Eval (opencode/docker)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-ollama
        with:
          models: |
            - name: qwen3:4b
              modelfile: modelfiles/qwen3-4b-skill-eval-opencode-agent.ci.Modelfile
              as: qwen3-4b-skill-eval-opencode-agent
      - name: Compute Docker cache key
        id: docker-cache
        run: |
          HASH=$(find tasks/superlint_demo -type f | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "key=docker-eval-superlint-$HASH" >> "$GITHUB_OUTPUT"
      - name: Restore Docker image cache
        id: docker-restore
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: ${{ steps.docker-cache.outputs.key }}
      - name: Load cached Docker image
        if: steps.docker-restore.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/eval-image.tar
      - name: Run agent eval
        timeout-minutes: 15
        env:
          NODE_OPTIONS: '--max-old-space-size=256'
        run: npx tsx src/cli.ts superlint_demo --agent=opencode --provider=docker --trials=1
      - name: Save Docker image to cache
        if: steps.docker-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep skill-eval-superlint | head -1)
          if [ -n "$IMAGE" ]; then
            docker save -o /tmp/docker-cache/eval-image.tar "$IMAGE"
          fi
      - name: Preview results
        if: always()
        run: npm run preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-opencode-docker
          path: results/

  # ---------- ollama / local ----------
  ollama-local:
    name: Agent Eval (ollama/local)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-ollama
        with:
          models: |
            - name: qwen2.5:3b
              modelfile: modelfiles/qwen2.5-3b-skill-eval-ollama-agent.ci.Modelfile
              as: qwen2.5-3b-skill-eval-ollama-agent
            - name: qwen3:4b
      - name: Run agent eval
        timeout-minutes: 15
        env:
          NODE_OPTIONS: '--max-old-space-size=256'
        run: npx tsx src/cli.ts superlint_demo --agent=ollama --provider=local --trials=1
      - name: Preview results
        if: always()
        run: npm run preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-ollama-local
          path: results/

  # ---------- ollama / docker ----------
  ollama-docker:
    name: Agent Eval (ollama/docker)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-ollama
        with:
          models: |
            - name: qwen2.5:3b
              modelfile: modelfiles/qwen2.5-3b-skill-eval-ollama-agent.ci.Modelfile
              as: qwen2.5-3b-skill-eval-ollama-agent
            - name: qwen3:4b
      - name: Compute Docker cache key
        id: docker-cache
        run: |
          HASH=$(find tasks/superlint_demo -type f | sort | xargs sha256sum | sha256sum | cut -c1-16)
          echo "key=docker-eval-superlint-$HASH" >> "$GITHUB_OUTPUT"
      - name: Restore Docker image cache
        id: docker-restore
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: ${{ steps.docker-cache.outputs.key }}
      - name: Load cached Docker image
        if: steps.docker-restore.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-cache/eval-image.tar
      - name: Run agent eval
        timeout-minutes: 15
        env:
          NODE_OPTIONS: '--max-old-space-size=256'
        run: npx tsx src/cli.ts superlint_demo --agent=ollama --provider=docker --trials=1
      - name: Save Docker image to cache
        if: steps.docker-restore.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/docker-cache
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep skill-eval-superlint | head -1)
          if [ -n "$IMAGE" ]; then
            docker save -o /tmp/docker-cache/eval-image.tar "$IMAGE"
          fi
      - name: Preview results
        if: always()
        run: npm run preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-ollama-docker
          path: results/
